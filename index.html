<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="faviconE.png">

<title>Etiquetas Descartables</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f6f8;
        color: #212529;
        padding: 30px 15px;
    }

    .container {
        max-width: 600px;
        margin: auto;
    }

    .card {
        background: #ffffff;
        border: 1px solid #dee2e6;
        border-radius: 10px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        padding: 30px;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 25px;
        text-align: center;
        color: #072465;
    }

    .form-group {
        margin-bottom: 18px;
    }

    label {
        display: block;
        margin-bottom: 7px;
        font-weight: bold;
        font-size: 14px;
    }

    input,
    select {
        width: 100%;
        height: 42px;
        padding: 10px 12px;
        border: 1px solid #ced4da;
        border-radius: 6px;
        font-size: 15px;
        background: #fff;
        transition: border-color 0.2s;
    }

    input:focus,
    select:focus {
        outline: none;
        border-color: #072465;
    }

    .btn {
        width: 100%;
        height: 45px;
        border: none;
        border-radius: 6px;
        background: #072465;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
    }

    .btn:hover {
        background: #808080;
    }

    .footer-note {
        margin-top: 15px;
        font-size: 12px;
        color: #6c757d;
        text-align: center;
    }
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <h1>Etiquetas Descartables</h1>

        <form action="procesar.php" method="post">

            <div class="form-group">
                <label for="tipo_etiqueta">Tipo de etiqueta</label>
                <select name="tipo_etiqueta" id="tipo_etiqueta" required>
                    <option value="">Seleccionar...</option>
                    <option value="F">Etiqueta F</option>
                    <option value="D">Etiqueta D</option>
                    <option value="P">Etiqueta P</option>
                    <option value="B">Etiqueta B</option>
                    <option value="K">Etiqueta K</option>
                </select>
            </div>

            <div class="form-group">
                <label for="valor_inicial">Valor inicial</label>
                <input type="text" name="valor_inicial" id="valor_inicial" required>
            </div>

            <div class="form-group">
                <label for="valor_final">Valor final</label>
                <input type="text" name="valor_final" id="valor_final" required>
            </div>

            <div class="form-group">
                <label for="printerIP">IP de la impresora</label>
                <input type="text" name="printerIP" id="printerIP" value="10.0.112.25" required>
            </div>

            <button type="submit" class="btn">Imprimir etiquetas</button>

        </form>

        <div class="footer-note">
        </div>
        
    </div>
</div>

</body>
</html>
<!-- Habilitar extensiones ZIP y SOCKET en php.ini -->
